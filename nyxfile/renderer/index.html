<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src *; img-src 'self' data: file:;">
  <title>Nyxfile</title>
  <link rel="stylesheet" href="style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  </style>
</head>
<body>
  <!-- Title Bar -->
  <div id="titlebar">
    <div class="tb-left">
      <span class="tb-title">Nyxfile</span>
    </div>
    <div class="tb-right">
      <button id="btn-settings" class="tb-btn" title="Settings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button id="btn-min" class="tb-btn" title="Minimize">
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button id="btn-max" class="tb-btn" title="Maximize">
        <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
      </button>
      <button id="btn-close" class="tb-btn" title="Close">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <!-- Main Layout -->
  <div id="app">
    <!-- Left Panel: File Browser -->
    <aside id="panel-files" class="panel">
      <div class="panel-header">
        <h3>Files</h3>
        <div class="header-actions">
          <button id="btn-nav-root" class="btn-icon" title="This PC">
            <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          </button>
          <button id="btn-nav-up" class="btn-icon" title="Go up">
            <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
          </button>
          <button id="btn-select-dir" class="btn-icon" title="Open folder">
            <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          </button>
        </div>
      </div>
      <div id="current-path"></div>
      <div id="file-tree"></div>
    </aside>

    <!-- Center: Chat -->
    <main id="panel-chat" class="panel">
      <div class="panel-header">
        <h3>Chat</h3>
        <div id="ai-mode-indicator" class="ai-badge">Cloud</div>
      </div>
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <textarea id="chat-input" placeholder="Describe what you want to do..." rows="2"></textarea>
        <button id="btn-send" class="btn-primary">
          <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#000;fill:none;stroke-width:2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </main>

    <!-- Right Panel: Preview -->
    <aside id="panel-preview" class="panel">
      <div class="panel-header">
        <h3>Preview</h3>
      </div>
      <div id="preview-content">
        <div class="preview-placeholder">Select a file to preview</div>
      </div>
    </aside>
  </div>

  <!-- Settings Modal -->
  <div id="settings-overlay" class="overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="btn-settings-close" class="btn-icon">
          <svg viewBox="0 0 24 24" style="width:16px;height:16px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label class="setting-label">Provider</label>
          <select id="select-provider" class="input-full">
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic (Claude)</option>
            <option value="opencode">OpenCode Go</option>
            <option value="ollama">Ollama (Local)</option>
            <option value="openrouter">OpenRouter</option>
            <option value="deepseek">DeepSeek</option>
            <option value="groq">Groq</option>
            <option value="custom">Custom API</option>
          </select>
        </div>
        <div id="settings-api-key" class="setting-group">
          <label class="setting-label">API Key</label>
          <input type="password" id="input-api-key" placeholder="Enter API key..." class="input-full">
        </div>
        <div id="settings-model" class="setting-group">
          <label class="setting-label">Model</label>
          <input type="text" id="input-model" placeholder="Model ID" class="input-full">
        </div>
        <div id="settings-base-url" class="setting-group hidden">
          <label class="setting-label">Base URL</label>
          <input type="text" id="input-base-url" placeholder="https://api.example.com/v1" class="input-full">
        </div>
        <div id="settings-ollama" class="setting-group hidden">
          <label class="setting-label">Ollama Model</label>
          <select id="select-ollama-model" class="input-full">
            <option value="llama3.2">llama3.2</option>
          </select>
          <button id="btn-refresh-models" class="btn-secondary btn-sm">Refresh</button>
        </div>
        <div class="setting-group">
          <div class="check-row">
            <input type="checkbox" id="input-confirm-delete" checked>
            <span>Confirm before destructive actions</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Action Confirmation Modal -->
  <div id="confirm-overlay" class="overlay hidden">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>Confirm actions</h3>
      </div>
      <div class="modal-body" id="confirm-body"></div>
      <div class="modal-footer">
        <button id="btn-confirm-no" class="btn-secondary">Cancel</button>
        <button id="btn-confirm-yes" class="btn-primary">Execute</button>
      </div>
    </div>
  </div>

  <!-- SVG icon library (hidden) -->
  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <g id="icon-folder"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></g>
      <g id="icon-file"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></g>
      <g id="icon-image"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></g>
      <g id="icon-code"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></g>
      <g id="icon-video"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></g>
      <g id="icon-audio"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></g>
      <g id="icon-archive"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><line x1="10" y1="12" x2="14" y2="12"/></g>
      <g id="icon-search"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></g>
      <g id="icon-trash"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></g>
      <g id="icon-move"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></g>
      <g id="icon-copy"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></g>
      <g id="icon-open"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></g>
      <g id="icon-chevron-right"><polyline points="9 18 15 12 9 6"/></g>
    </defs>
  </svg>

  <script>
    if (window.api && window.api.platform === 'darwin') document.body.classList.add('darwin')
  </script>
  <script src="settings.js"></script>
  <script src="files.js"></script>
  <script src="preview.js"></script>
  <script src="chat.js"></script>
</body>
</html>
